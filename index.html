<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リノベ好み診断書 | ViVi不動産</title>
<style>
/* ============================================================
   ▼ 編集は HTML下部の data スクリプトだけでOK ▼

   タイプ定義・結果文言は全構成で共通です。
   ============================================================ */
:root{
  --navy:#1f3a5f; --navy-d:#142840;
  --gold:#c9a24b; --gold-l:#e3c987;
  --bg:#f7f4ee; --card:#fff; --ink:#2a2a2a; --ink-soft:#5c6470;
  --line:#e4ddd0; --shadow:0 10px 40px rgba(31,58,95,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.7;-webkit-font-smoothing:antialiased}
.wrap{max-width:720px;margin:0 auto;padding:24px 20px 80px}
header{text-align:center;padding:32px 0 20px}
.logo-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:6px}
.logo-row img{width:84px;height:auto;flex:0 0 auto}
.logo-row .ttl{text-align:left}
.brand{font-size:13px;letter-spacing:.25em;color:var(--gold);font-weight:700;margin-bottom:8px}
header h1{font-size:27px;color:var(--navy);font-weight:800;letter-spacing:.04em;line-height:1.3}
header .sub{margin-top:12px;color:var(--ink-soft);font-size:14px}

.progress{margin:8px 0 28px;height:6px;background:var(--line);border-radius:99px;overflow:hidden}
.progress span{display:block;height:100%;width:0;border-radius:99px;
  background:linear-gradient(90deg,var(--gold),var(--gold-l));transition:width .4s cubic-bezier(.4,0,.2,1)}
.pcount{text-align:right;font-size:12px;color:var(--ink-soft);margin-bottom:18px;letter-spacing:.05em}

.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);
  padding:30px 26px;margin-bottom:20px;animation:rise .5s ease both}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.qnum{display:inline-block;font-size:12px;font-weight:700;color:var(--gold);letter-spacing:.2em;margin-bottom:10px}
.qtext{font-size:19px;font-weight:700;color:var(--navy);margin-bottom:20px;line-height:1.5}
.opts{display:flex;flex-direction:column;gap:11px}
.opt{display:flex;align-items:center;gap:13px;padding:15px 17px;border:1.5px solid var(--line);
  border-radius:12px;cursor:pointer;background:#fff;transition:all .18s ease;font-size:15px}
.opt:hover{border-color:var(--gold-l);background:#fdfaf3}
.opt.sel{border-color:var(--navy);background:#f2f6fb;box-shadow:inset 0 0 0 1px var(--navy)}
.opt .dot{flex:0 0 20px;height:20px;border-radius:50%;border:2px solid var(--line);transition:all .18s}
.opt.sel .dot{border-color:var(--navy);background:var(--navy);box-shadow:inset 0 0 0 3px #fff}

/* 家族構成の選択（最初の画面） */
.hh-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hh{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:22px 16px;cursor:pointer;
  text-align:center;transition:all .18s}
.hh:hover{border-color:var(--gold);background:#fdfaf3;transform:translateY(-2px)}
.hh .ico{font-size:30px;display:block;margin-bottom:8px}
.hh .nm{font-size:15px;font-weight:700;color:var(--navy)}
.hh .de{font-size:12px;color:var(--ink-soft);margin-top:3px}

.actions{display:flex;gap:12px;margin-top:8px}
.btn{flex:1;padding:15px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;
  font-family:inherit;letter-spacing:.05em;transition:all .2s}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-main{background:var(--navy);color:#fff}
.btn-main:not(:disabled):hover{background:var(--navy-d);transform:translateY(-1px)}
.btn-sub{background:#fff;color:var(--navy);border:1.5px solid var(--line);flex:0 0 auto;padding:15px 22px}
.btn-sub:hover{border-color:var(--navy)}

.result{animation:rise .6s ease both}
.rhead{text-align:center;padding:10px 0 26px}
.rhead .lead{font-size:14px;color:var(--ink-soft);letter-spacing:.1em}
.rtype{font-size:32px;font-weight:800;color:var(--navy);margin:8px 0 6px;letter-spacing:.03em}
.rtype .em{color:var(--gold)}
.rhead .tag{font-size:15px;color:var(--ink-soft)}
.rhead .hhname{display:inline-block;margin-top:10px;font-size:12px;color:var(--gold);
  border:1px solid var(--gold-l);border-radius:99px;padding:3px 14px;letter-spacing:.1em}
.rcard{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);
  padding:30px 26px;margin-bottom:18px}
.rcard h3{font-size:15px;color:var(--gold);font-weight:700;letter-spacing:.12em;margin-bottom:14px;
  padding-bottom:10px;border-bottom:1px solid var(--line)}
.rcard p{font-size:15px;color:var(--ink);margin-bottom:10px}
.rcard ul{list-style:none;margin-top:6px}
.rcard li{font-size:15px;padding:9px 0 9px 26px;position:relative;border-bottom:1px dashed var(--line)}
.rcard li:last-child{border-bottom:none}
.rcard li::before{content:"";position:absolute;left:4px;top:17px;width:8px;height:8px;border-radius:50%;background:var(--gold)}
.scores{margin-top:6px}
.srow{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.slabel{flex:0 0 130px;font-size:13px;color:var(--ink-soft)}
.sbar{flex:1;height:9px;background:var(--line);border-radius:99px;overflow:hidden}
.sbar span{display:block;height:100%;background:linear-gradient(90deg,var(--navy),#3a6ea5);border-radius:99px}
.sbar.top span{background:linear-gradient(90deg,var(--gold),var(--gold-l))}
.sval{flex:0 0 34px;text-align:right;font-size:13px;font-weight:700;color:var(--navy)}
.memo label{display:block;font-size:13px;color:var(--ink-soft);margin-bottom:6px}
.memo textarea{width:100%;min-height:90px;padding:13px;border:1.5px solid var(--line);border-radius:10px;
  font-family:inherit;font-size:14px;resize:vertical}
.memo textarea:focus{outline:none;border-color:var(--navy)}
.cust{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.cust input{flex:1;min-width:140px;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;
  font-family:inherit;font-size:14px}
.cust input:focus{outline:none;border-color:var(--navy)}
.rfoot{text-align:center;margin-top:24px;font-size:12px;color:var(--ink-soft);letter-spacing:.08em}
.rfoot .date{margin-top:4px}

@media print{
  body{background:#fff}.wrap{max-width:100%;padding:0}
  .no-print{display:none!important}
  .rcard,.card{box-shadow:none;border:1px solid #ccc;break-inside:avoid}
  header{padding:10px 0}.progress,.pcount{display:none}
}
@media(max-width:480px){
  header h1{font-size:21px}.rtype{font-size:26px}
  .logo-row img{width:66px}.logo-row{gap:11px}
  .slabel{flex:0 0 95px;font-size:12px}.hh-grid{grid-template-columns:1fr 1fr}
  .taste-grid{grid-template-columns:1fr 1fr!important}
}

/* テイスト選択（写真付き） */
.taste-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.taste{background:#fff;border:1.5px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;
  transition:all .18s;text-align:center}
.taste:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:var(--shadow)}
.taste .ph{width:100%;aspect-ratio:4/3;background:#ece6da;display:flex;align-items:center;justify-content:center;
  color:#a99e88;font-size:12px;letter-spacing:.05em;background-size:cover;background-position:center}
.taste .ph.noimg::after{content:"イメージ写真";opacity:.7}
.taste .body{padding:13px 10px}
.taste .nm{font-size:15px;font-weight:700;color:var(--navy)}
.taste .de{font-size:11px;color:var(--ink-soft);margin-top:3px;line-height:1.5}

/* 結果の参考写真 */
.gallery{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.gallery figure{margin:0;border-radius:12px;overflow:hidden;border:1px solid var(--line)}
.gallery .img{width:100%;aspect-ratio:4/3;background:#ece6da;display:flex;align-items:center;justify-content:center;
  color:#a99e88;font-size:12px;background-size:cover;background-position:center}
.gallery figcaption{font-size:12px;color:var(--ink-soft);text-align:center;padding:7px 0;background:#faf8f3}
.tastebadge{display:inline-block;margin-left:6px;font-size:12px;color:var(--gold);
  border:1px solid var(--gold-l);border-radius:99px;padding:3px 12px;letter-spacing:.08em}
@media(max-width:480px){.gallery{grid-template-columns:1fr}}
</style>
</head>

function renderSelect(){
  let html = `<div class="card"><div class="qnum">STEP 1</div>
    <div class="qtext">ご家族の構成を選んでください</div><div class="hh-grid">`;
  for(const k in data.HOUSEHOLDS){
    const h=data.HOUSEHOLDS[k];
    html+=`<div class="hh" onclick="startHH('${k}')">
      <span class="ico">${h.ico}</span>
      <div class="nm">${h.name}</div><div class="de">${h.desc}</div></div>`;
  }
  html+=`</div></div>`;
  html+=`<div class="actions no-print">
    <button class="btn btn-sub" style="flex:1" onclick="document.getElementById('loadFile').click()">
      保存データを読み込む</button></div>
    <input type="file" id="loadFile" accept=".json,application/json" style="display:none" onchange="loadData(event)">`;
  app.innerHTML=html;
}

function startHH(k){
  state.hh=k; state.answers={}; state.taste=null;
  renderTaste();
  window.scrollTo({top:0,behavior:"smooth"});
}

/* ---- テイスト選択画面（写真付き） ---- */
function renderTaste(){
  sub.innerHTML = data.HOUSEHOLDS[state.hh].name+"。次に、好みのインテリアの雰囲気を選んでください。";
  let html=`<div class="card"><div class="qnum">STEP 2</div>
    <div class="qtext">好みのテイストは？<span style="font-size:13px;font-weight:400;color:var(--ink-soft)">　ピンとくる写真を選んでください</span></div>
    <div class="taste-grid">`;
  for(const k in data.TASTES){
    const t=data.TASTES[k];
    // 画像が無い場合は noimg クラスでグレー枠（onerrorで自動フォールバック）
    const src=data.IMG_DIR+t.key+"_main"+data.IMG_EXT;
    html+=`<div class="taste" onclick="startTaste('${k}')">
      <div class="ph noimg" style="background-image:url('${src}')"
        onload=""></div>
      <div class="body"><div class="nm">${t.name}</div><div class="de">${t.desc}</div></div>
    </div>`;
  }
  html+=`</div></div>
    <div class="actions no-print">
      <button class="btn btn-sub" style="flex:1" onclick="backToSelect()">家族構成を選び直す</button></div>`;
  app.innerHTML=html;
  // 画像が実在すれば noimg を外して「イメージ写真」表記を消す
  document.querySelectorAll(".taste .ph").forEach(ph=>{
    const url=ph.style.backgroundImage.slice(5,-2);
    const im=new Image();
    im.onload=()=>ph.classList.remove("noimg");
    im.src=url;
  });
}

function startTaste(k){
  state.taste=k;
  sub.innerHTML = data.HOUSEHOLDS[state.hh].name+"の暮らしに合わせた10の質問です。";
  renderQuiz();
  window.scrollTo({top:0,behavior:"smooth"});
}

/* ---- 設問画面 ---- */
function renderQuiz(){
  const Q = data.HOUSEHOLDS[state.hh].questions;
  const total=Q.length, answered=Object.keys(state.answers).length;
  let html=`<div class="progress no-print"><span style="width:${answered/total*100}%"></span></div>
    <div class="pcount no-print">${answered} / ${total} 問</div>`;
  Q.forEach((q,i)=>{
    html+=`<div class="card"><div class="qnum">QUESTION ${i+1}</div>
      <div class="qtext">${q.q}</div><div class="opts">`;
    q.opts.forEach((o,j)=>{
      const sel=state.answers[i]===j?"sel":"";
      html+=`<div class="opt ${sel}" onclick="pick(${i},${j})"><div class="dot"></div><div>${o.t}</div></div>`;
    });
    html+=`</div></div>`;
  });
  const ready=answered===total;
  html+=`<div class="actions no-print">
    <button class="btn btn-sub" onclick="renderTaste()">テイストを選び直す</button>
    <button class="btn btn-main" ${ready?"":"disabled"} onclick="showResult()">
      ${ready?"診断結果を見る":`あと ${total-answered} 問`}</button></div>`;
  app.innerHTML=html;
}

function backToSelect(){
  state.hh=null; state.taste=null; state.answers={};
  sub.innerHTML="まずはご家族の構成を選んでください。<br>構成に合わせた質問で、ぴったりのリノベ方針をご提案します。";
  renderSelect();
  window.scrollTo({top:0,behavior:"smooth"});
}

function pick(i,j){
  state.answers[i]=j;
  renderQuiz();
  const cards=document.querySelectorAll(".card");
  if(state.answers[i+1]===undefined && cards[i+1]) cards[i+1].scrollIntoView({behavior:"smooth",block:"center"});
}

/* ---- スコア集計・結果 ---- */
function calcScores(){
  const Q=data.HOUSEHOLDS[state.hh].questions;
  const s={}; Object.keys(data.TYPES).forEach(k=>s[k]=0);
  Q.forEach((q,i)=>{const o=q.opts[state.answers[i]]; if(o)for(const k in o.points)s[k]+=o.points[k];});
  return s;
}

function showResult(){
  const H=data.HOUSEHOLDS[state.hh];
  const scores=calcScores(), keys=Object.keys(data.TYPES);
  const max=Math.max(...keys.map(k=>scores[k]));
  const topKey=keys.find(k=>scores[k]===max);
  const T=data.TYPES[topKey], R=data.RESULTS[topKey];
  const maxScore=max||1;
  const today=new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric"});

  let bars="";
  [...keys].sort((a,b)=>scores[b]-scores[a]).forEach(k=>{
    const top=k===topKey?"top":"";
    bars+=`<div class="srow"><div class="slabel">${data.TYPES[k].label}</div>
      <div class="sbar ${top}"><span style="width:${scores[k]/maxScore*100}%"></span></div>
      <div class="sval">${scores[k]}</div></div>`;
  });
  let plan=""; R.plan.forEach(p=>plan+=`<li>${p}</li>`);

  // テイスト参考写真
  const TS = data.TASTES[state.taste];
  let gallery="";
  if(TS){
    const lSrc=data.IMG_DIR+TS.key+"_main"+data.IMG_EXT;
    const kSrc=data.IMG_DIR+TS.key+"_kitchen"+data.IMG_EXT;
    gallery=`<div class="rcard"><h3>参考イメージ
        <span class="tastebadge">${TS.name}</span></h3>
      <div class="gallery">
        <figure><div class="img" data-src="${lSrc}">イメージ写真</div><figcaption>リビング</figcaption></figure>
        <figure><div class="img" data-src="${kSrc}">イメージ写真</div><figcaption>キッチン</figcaption></figure>
      </div>
      <p style="font-size:13px;color:var(--ink-soft);margin-top:12px">※ ${TS.name}の参考イメージです。実際の施工事例は担当者がご案内します。</p>
    </div>`;
  }

  const r = state.restore || {};
  const esc = s => (s||"").replace(/"/g,"&quot;");
  app.innerHTML=`<div class="result">
    <div class="cust no-print">
      <input id="cname" placeholder="お客様のお名前（任意）" value="${esc(r.cname)}">
      <input id="cprop" placeholder="物件名・メモ（任意）" value="${esc(r.cprop)}"></div>
    <div class="rhead">
      <div class="lead">あなたの暮らしタイプは</div>
      <div class="rtype"><span class="em">${T.label}</span></div>
      <div class="tag">${R.catch}</div>
      <div class="hhname">${H.ico} ${H.name}</div>
      ${TS?`<div class="hhname">${TS.name}</div>`:""}</div>
    <div class="rcard"><h3>診断コメント</h3>
      <p>${R.desc}</p><p>${H.note}</p></div>
    <div class="rcard"><h3>おすすめのリノベ方針</h3><ul>${plan}</ul></div>
    ${gallery}
    <div class="rcard"><h3>あなたの暮らしバランス</h3><div class="scores">${bars}</div></div>
    <div class="rcard memo no-print"><h3>営業メモ</h3>
      <label>ヒアリング内容・次回提案ポイントなど</label>
      <textarea id="memo" placeholder="例）予算◯◯万円、入居希望時期、気になっていた点 など">${r.memo||""}</textarea></div>
    <div class="rfoot"><div>ViVi不動産株式会社　中古×リノベーション</div>
      <div class="date">診断日：${r.date||today}</div></div>
    <div class="actions no-print" style="margin-top:18px">
      <button class="btn btn-sub" onclick="location.reload()">最初から</button>
      <button class="btn btn-main" onclick="saveData()">データ保存</button>
      <button class="btn btn-main" onclick="window.print()">印刷・PDF</button></div>
  </div>`;
  // 画像が実在すれば背景に差し込み（無ければ「イメージ写真」のまま）
  document.querySelectorAll(".gallery .img").forEach(el=>{
    const url=el.getAttribute("data-src");
    const im=new Image();
    im.onload=()=>{el.style.backgroundImage=`url('${url}')`;el.textContent="";};
    im.src=url;
  });
  state.restore=null;
  window.scrollTo({top:0,behavior:"smooth"});
}

/* ---- データ保存（JSON書き出し） ---- */
function saveData(){
  const cname=(document.getElementById("cname")||{}).value||"";
  const cprop=(document.getElementById("cprop")||{}).value||"";
  const memo=(document.getElementById("memo")||{}).value||"";
  const payload={
    app:"vivi-reno-shindan", version:1,
    savedAt:new Date().toISOString(),
    date:new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric"}),
    hh:state.hh, taste:state.taste, answers:state.answers,
    cname, cprop, memo
  };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const stamp=new Date().toISOString().slice(0,10);
  const safe=(cname||"診断").replace(/[\\/:*?"<>|]/g,"_");
  const a=document.createElement("a");
  a.href=url; a.download=`リノベ診断_${safe}_${stamp}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

/* ---- データ読み込み（JSON復元） ---- */
function loadData(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.app!=="vivi-reno-shindan"||!data.HOUSEHOLDS[d.hh])
        throw new Error("このツールの保存データではないようです。");
      state.hh=d.hh;
      state.taste=d.taste||null;
      state.answers=d.answers||{};
      state.restore={cname:d.cname,cprop:d.cprop,memo:d.memo,date:d.date};
      sub.innerHTML=data.HOUSEHOLDS[d.hh].name+"の診断データを読み込みました。";
      // 全問回答済みなら結果へ、未完なら設問画面へ
      const total=data.HOUSEHOLDS[d.hh].questions.length;
      if(Object.keys(state.answers).length>=total) showResult();
      else renderQuiz();
    }catch(err){
      alert("読み込めませんでした。\n"+(err.message||"ファイル形式を確認してください。"));
    }
    e.target.value=""; // 同じファイルを再選択できるよう
  };
  reader.readAsText(file,"utf-8");
}

renderSelect();
</script>
</body>
</html>
