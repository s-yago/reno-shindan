<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リノベ好み診断書 | ViVi不動産</title>
<style>
/* ============================================================
   ▼ 編集は HTML下部の data スクリプトだけでOK ▼
   家族構成（HOUSEHOLDS）ごとに設問（questions）を持ちます。
   タイプ定義・結果文言は全構成で共通です。
   ============================================================ */
:root{
  --navy:#1f3a5f; --navy-d:#142840;
  --gold:#c9a24b; --gold-l:#e3c987;
  --bg:#f7f4ee; --card:#fff; --ink:#2a2a2a; --ink-soft:#5c6470;
  --line:#e4ddd0; --shadow:0 10px 40px rgba(31,58,95,.10);
  --planroom:#f2f6fb; --planacc:#faf3e2; --white:#ffffff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.7;-webkit-font-smoothing:antialiased}
.wrap{max-width:720px;margin:0 auto;padding:24px 20px 80px}
header{text-align:center;padding:32px 0 20px}
.logo-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:6px}
.logo-row img{width:84px;height:auto;flex:0 0 auto}
.logo-row .ttl{text-align:left}
.brand{font-size:13px;letter-spacing:.25em;color:var(--gold);font-weight:700;margin-bottom:8px}
header h1{font-size:27px;color:var(--navy);font-weight:800;letter-spacing:.04em;line-height:1.3}
header .sub{margin-top:12px;color:var(--ink-soft);font-size:14px}

.progress{margin:8px 0 28px;height:6px;background:var(--line);border-radius:99px;overflow:hidden}
.progress span{display:block;height:100%;width:0;border-radius:99px;
  background:linear-gradient(90deg,var(--gold),var(--gold-l));transition:width .4s cubic-bezier(.4,0,.2,1)}
.pcount{text-align:right;font-size:12px;color:var(--ink-soft);margin-bottom:18px;letter-spacing:.05em}

.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);
  padding:30px 26px;margin-bottom:20px;animation:rise .5s ease both}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.qnum{display:inline-block;font-size:12px;font-weight:700;color:var(--gold);letter-spacing:.2em;margin-bottom:10px}
.qtext{font-size:19px;font-weight:700;color:var(--navy);margin-bottom:20px;line-height:1.5}
.opts{display:flex;flex-direction:column;gap:11px}
.opt{display:flex;align-items:center;gap:13px;padding:15px 17px;border:1.5px solid var(--line);
  border-radius:12px;cursor:pointer;background:#fff;transition:all .18s ease;font-size:15px}
.opt:hover{border-color:var(--gold-l);background:#fdfaf3}
.opt.sel{border-color:var(--navy);background:#f2f6fb;box-shadow:inset 0 0 0 1px var(--navy)}
.opt .dot{flex:0 0 20px;height:20px;border-radius:50%;border:2px solid var(--line);transition:all .18s}
.opt.sel .dot{border-color:var(--navy);background:var(--navy);box-shadow:inset 0 0 0 3px #fff}

/* A/B 2人同時回答 */
.abopt{display:flex;align-items:stretch;gap:8px;border:1.5px solid var(--line);border-radius:12px;
  background:#fff;transition:all .18s ease;overflow:hidden}
.abopt:hover{border-color:var(--gold-l)}
.abopt .label{flex:1;display:flex;align-items:center;padding:13px 15px;font-size:14.5px;line-height:1.45}
.abopt .abpick{flex:0 0 auto;display:flex}
.abtag{flex:0 0 46px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  border-left:1.5px solid var(--line);cursor:pointer;font-size:12px;font-weight:700;color:var(--ink-soft);
  transition:all .15s;user-select:none}
.abtag small{font-size:10px;font-weight:600;opacity:.7}
.abtag:hover{background:#fdfaf3}
.abtag.onA{background:var(--navy);color:#fff;border-color:var(--navy)}
.abtag.onB{background:var(--gold);color:#fff;border-color:var(--gold)}
.abtag.solo{flex-basis:70px}
.ab-head{display:flex;justify-content:flex-end;gap:8px;margin-bottom:10px}
.ab-head .chip{font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px}
.ab-head .chipA{background:var(--navy);color:#fff}
.ab-head .chipB{background:var(--gold);color:#fff}

/* ペイン設問（複数選択チップ） */
.pains{display:flex;flex-direction:column;gap:9px}
.painrow{display:flex;align-items:stretch;gap:8px;border:1.5px solid var(--line);border-radius:12px;
  background:#fff;overflow:hidden;transition:all .18s}
.painrow .label{flex:1;display:flex;align-items:center;padding:12px 15px;font-size:14.5px;line-height:1.4}
.painrow .ppick{flex:0 0 auto;display:flex}
.ptag{flex:0 0 46px;display:flex;align-items:center;justify-content:center;border-left:1.5px solid var(--line);
  cursor:pointer;font-size:12px;font-weight:700;color:var(--ink-soft);transition:all .15s;user-select:none}
.ptag.onA{background:var(--navy);color:#fff;border-color:var(--navy)}
.ptag.onB{background:var(--gold);color:#fff;border-color:var(--gold)}
.ptag.solo{flex-basis:70px}
.pain-note{font-size:12.5px;color:var(--ink-soft);margin:4px 0 12px}

/* 結果：A・B 2果並べ */
.two-results{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:8px}
@media(max-width:560px){.two-results{grid-template-columns:1fr}}
.person-card{border:1.5px solid var(--line);border-radius:14px;padding:18px 16px;background:#fff}
.person-card.A{border-top:4px solid var(--navy)}
.person-card.B{border-top:4px solid var(--gold)}
.person-card .who{font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--ink-soft);margin-bottom:4px}
.person-card .ptype{font-size:18px;font-weight:800;color:var(--navy);margin-bottom:10px}

/* 優先解決ペイン（別軸） */
.pain-result{display:flex;flex-direction:column;gap:8px}
.pain-item{display:flex;align-items:center;gap:10px;padding:11px 13px;border:1px solid var(--line);
  border-radius:10px;background:#faf8f3}
.pain-item .pl{flex:1;font-size:14px}
.pain-item .who-badge{flex:0 0 auto;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px}
.pain-item .sol{flex:0 0 auto;font-size:12px;color:var(--gold);font-weight:700}
.whoA{background:var(--navy);color:#fff}
.whoB{background:var(--gold);color:#fff}
.whoAB{background:linear-gradient(90deg,var(--navy) 50%,var(--gold) 50%);color:#fff}

/* 家族構成の選択（最初の画面） */
.hh-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hh{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:22px 16px;cursor:pointer;
  text-align:center;transition:all .18s}
.hh:hover{border-color:var(--gold);background:#fdfaf3;transform:translateY(-2px)}
.hh .ico{font-size:30px;display:block;margin-bottom:8px}
.hh .nm{font-size:15px;font-weight:700;color:var(--navy)}
.hh .de{font-size:12px;color:var(--ink-soft);margin-top:3px}

.actions{display:flex;gap:12px;margin-top:8px}
.btn{flex:1;padding:15px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;
  font-family:inherit;letter-spacing:.05em;transition:all .2s}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-main{background:var(--navy);color:#fff}
.btn-main:not(:disabled):hover{background:var(--navy-d);transform:translateY(-1px)}
.btn-sub{background:#fff;color:var(--navy);border:1.5px solid var(--line);flex:0 0 auto;padding:15px 22px}
.btn-sub:hover{border-color:var(--navy)}

.result{animation:rise .6s ease both}
.rhead{text-align:center;padding:10px 0 26px}
.rhead .lead{font-size:14px;color:var(--ink-soft);letter-spacing:.1em}
.rtype{font-size:32px;font-weight:800;color:var(--navy);margin:8px 0 6px;letter-spacing:.03em}
.rtype .em{color:var(--gold)}
.rhead .tag{font-size:15px;color:var(--ink-soft)}
.rhead .hhname{display:inline-block;margin-top:10px;font-size:12px;color:var(--gold);
  border:1px solid var(--gold-l);border-radius:99px;padding:3px 14px;letter-spacing:.1em}
.rcard{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);
  padding:30px 26px;margin-bottom:18px}
.rcard h3{font-size:15px;color:var(--gold);font-weight:700;letter-spacing:.12em;margin-bottom:14px;
  padding-bottom:10px;border-bottom:1px solid var(--line)}
.rcard p{font-size:15px;color:var(--ink);margin-bottom:10px}
.rcard ul{list-style:none;margin-top:6px}
.rcard li{font-size:15px;padding:9px 0 9px 26px;position:relative;border-bottom:1px dashed var(--line)}
.rcard li:last-child{border-bottom:none}
.rcard li::before{content:"";position:absolute;left:4px;top:17px;width:8px;height:8px;border-radius:50%;background:var(--gold)}
.scores{margin-top:6px}
.srow{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.slabel{flex:0 0 130px;font-size:13px;color:var(--ink-soft)}
.sbar{flex:1;height:9px;background:var(--line);border-radius:99px;overflow:hidden}
.sbar span{display:block;height:100%;background:linear-gradient(90deg,var(--navy),#3a6ea5);border-radius:99px}
.sbar.top span{background:linear-gradient(90deg,var(--gold),var(--gold-l))}
.sval{flex:0 0 34px;text-align:right;font-size:13px;font-weight:700;color:var(--navy)}
.memo label{display:block;font-size:13px;color:var(--ink-soft);margin-bottom:6px}
.memo textarea{width:100%;min-height:90px;padding:13px;border:1.5px solid var(--line);border-radius:10px;
  font-family:inherit;font-size:14px;resize:vertical}
.memo textarea:focus{outline:none;border-color:var(--navy)}
.cust{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.cust input{flex:1;min-width:140px;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;
  font-family:inherit;font-size:14px}
.cust input:focus{outline:none;border-color:var(--navy)}
.rfoot{text-align:center;margin-top:24px;font-size:12px;color:var(--ink-soft);letter-spacing:.08em}
.rfoot .date{margin-top:4px}

@media print{
  body{background:#fff}.wrap{max-width:100%;padding:0}
  .no-print{display:none!important}
  .rcard,.card{box-shadow:none;border:1px solid #ccc;break-inside:avoid}
  header{padding:10px 0}.progress,.pcount{display:none}
}
@media(max-width:480px){
  header h1{font-size:21px}.rtype{font-size:26px}
  .logo-row img{width:66px}.logo-row{gap:11px}
  .slabel{flex:0 0 95px;font-size:12px}.hh-grid{grid-template-columns:1fr 1fr}
  .taste-grid{grid-template-columns:1fr 1fr!important}
}

/* テイスト選択（写真付き） */
.taste-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.taste{background:#fff;border:1.5px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;
  transition:all .18s;text-align:center}
.taste:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:var(--shadow)}
.taste .ph{width:100%;aspect-ratio:4/3;background:#ece6da;display:flex;align-items:center;justify-content:center;
  color:#a99e88;font-size:12px;letter-spacing:.05em;background-size:cover;background-position:center}
.taste .ph.noimg::after{content:"イメージ写真";opacity:.7}
.taste .body{padding:13px 10px}
.taste .nm{font-size:15px;font-weight:700;color:var(--navy)}
.taste .de{font-size:11px;color:var(--ink-soft);margin-top:3px;line-height:1.5}

/* 結果の参考写真 */
.gallery{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.gallery figure{margin:0;border-radius:12px;overflow:hidden;border:1px solid var(--line)}
.gallery .img{width:100%;aspect-ratio:4/3;background:#ece6da;display:flex;align-items:center;justify-content:center;
  color:#a99e88;font-size:12px;background-size:cover;background-position:center}
.gallery figcaption{font-size:12px;color:var(--ink-soft);text-align:center;padding:7px 0;background:#faf8f3}
.tastebadge{display:inline-block;margin-left:6px;font-size:12px;color:var(--gold);
  border:1px solid var(--gold-l);border-radius:99px;padding:3px 12px;letter-spacing:.08em}
.floorplan{background:#fbfaf7;border:1px solid var(--line);border-radius:10px;padding:12px}
.floorplan svg{width:100%;height:auto;display:block}
.sheet .ansmeta{display:flex;flex-wrap:wrap;gap:8px 18px;margin-bottom:14px;font-size:13px;color:var(--ink-soft)}
.sheet .ansmeta b{color:var(--navy)}
.ansrow{padding:8px 0;border-bottom:1px dashed var(--line)}
.ansrow:last-child{border-bottom:none}
.ansq{font-size:13px;color:var(--ink-soft)}
.ansa{font-size:14px;color:var(--ink);font-weight:600;margin-top:2px}
.manual h3{font-size:15px;color:var(--gold);font-weight:700;margin:20px 0 6px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.manual p{font-size:14px;color:var(--ink);margin:6px 0;line-height:1.8}
.manual ol{margin:6px 0 6px 1.2em;font-size:14px;line-height:1.9}
.manual b{color:var(--navy)}
.genrow{background:#fbfaf7;border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px}
.genrow-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.genrow-no{font-size:13px;font-weight:700;color:var(--gold);letter-spacing:.08em}
.genx{border:none;background:#eee;color:#888;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:14px}
.genx:hover{background:#e0a0a0;color:#fff}
.genrow select{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:8px;font-family:inherit;font-size:14px;background:#fff}
.genrow select:focus{outline:none;border-color:var(--navy)}
.genitems{margin-top:10px;display:flex;flex-direction:column;gap:7px}
.genitem{display:flex;align-items:center;gap:9px;padding:9px 11px;border:1.5px solid var(--line);border-radius:8px;cursor:pointer;font-size:13.5px;background:#fff;transition:all .15s}
.genitem.on{border-color:var(--navy);background:#f2f6fb}
.genitem input{width:17px;height:17px;flex:0 0 auto}
.genprompt{background:#fff;border:1px solid var(--gold-l);border-radius:10px;padding:14px;margin-top:12px}
.genprompt-h{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:8px}
.genprompt textarea{width:100%;min-height:120px;padding:11px;border:1.5px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px;line-height:1.7;resize:vertical;background:#fbfaf7;color:var(--ink)}
/* 画像拡大（ライトボックス） */
.lightbox{display:none;position:fixed;inset:0;z-index:9999;background:rgba(20,40,64,.92);
  align-items:center;justify-content:center;padding:20px;cursor:zoom-out}
.lightbox.on{display:flex}
.lightbox img{max-width:100%;max-height:92vh;border-radius:8px;box-shadow:0 10px 50px rgba(0,0,0,.5)}
.lb-close{position:fixed;top:16px;right:18px;width:44px;height:44px;border:none;border-radius:50%;
  background:rgba(255,255,255,.9);color:var(--navy);font-size:26px;cursor:pointer;line-height:1;z-index:10000}
.lb-close:hover{background:#fff}
.zoomable{cursor:zoom-in}
.floorplan.zoomable:hover,.gallery .img.zoomable:hover{opacity:.92}
.zoomhint{font-size:11px;color:var(--ink-soft);text-align:center;margin-top:6px}
@media(max-width:480px){.gallery{grid-template-columns:1fr}}
</style>
</head>

<script id="data">
/* 暮らしタイプ（全構成共通）。結果のバー並び順もこの順。 */
const TYPES = {
  family:  { name:"つながり", label:"つながり重視タイプ" },
  privacy: { name:"自分時間", label:"自分時間重視タイプ" },
  guest:   { name:"もてなし", label:"ホテルライクタイプ" },
  func:    { name:"機能・収納", label:"家事ラク合理タイプ" },
  hobby:   { name:"こだわり", label:"こだわり表現タイプ" },
};

/* ▼ インテリアのテイスト（写真で選ぶ）
   img フォルダに次のファイル名で画像を置くと自動で表示されます。
   未設置の間はグレーのイメージ枠が出ます。
   画像の置き場所：このHTMLと同じ階層の img/ フォルダ
   例) img/natural_main.jpg（テイスト選択とリビング表示に使用）  img/natural_kitchen.jpg */
const IMG_DIR = "img/";   // ← 画像フォルダ名（変えたいときはここだけ）
const IMG_EXT = ".jpg";   // ← 画像の拡張子（.png か .jpg。写真の形式に合わせる）
const TASTES = {
  natural:    { name:"ナチュラル系",   desc:"木の温もり・優しい色合い",          key:"natural" },
  nordic:     { name:"北欧系",         desc:"白基調・明るくシンプル",            key:"nordic" },
  hotel:      { name:"ホテルライク系", desc:"洗練・高級感・間接照明",            key:"hotel" },
  wamodern:   { name:"和モダン系",     desc:"和の落ち着き・木と黒・格子",        key:"wamodern" },
  industrial: { name:"インダストリアル系", desc:"コンクリート・黒鉄・古材の男前", key:"industrial" },

};

/* ▼ Geminiプロンプト生成用データ */
// 固定文（毎回プロンプトに自動で入る共通の注意書き）
const PROMPT_FIXED = "アップロードした室内写真をベースに、リノベ後の完成イメージを生成してください。間取り・窓やドアの位置・部屋の広さは変えないでください。明るく自然光が入る仕上がりにしてください。実在する物件のリフォーム提案画像として、リアルで写真のような仕上がりにしてください（イラスト調にはしないでください）。";

// テイストごとの内装描写（プロンプトに使う）
const TASTE_PROMPT = {
  natural:"内装はナチュラル系のテイストに。木の温もりを感じる優しい色合い、無垢材や明るい木目のフローリング、白やベージュを基調とした柔らかい雰囲気にしてください。",
  nordic:"内装は北欧系のテイストに。白を基調とした明るくシンプルな空間、ナチュラルな木の質感、すっきりと洗練された北欧インテリアの雰囲気にしてください。",
  hotel:"内装はホテルライク（モダン）系のテイストに。洗練された高級感、間接照明を効かせた落ち着いた配色、生活感を抑えたホテルのような上質な空間にしてください。",
  wamodern:"内装は和モダン系のテイストに。和の落ち着きを感じる木と黒を基調とした配色、格子や畳の要素を取り入れた、現代的で上品な和の空間にしてください。",
  industrial:"内装はインダストリアル系のテイストに。コンクリート調の壁、黒い鉄やアイアンの素材、古材を使った男前で無骨な雰囲気にしてください。",
  cafe:"内装はカフェ／フレンチ系のテイストに。白を基調にアンティーク調の家具、タイルやレンガの要素を取り入れた、可愛らしく温かみのあるカフェのような空間にしてください。",
};

// 部位とそこで選べる御社の推しリノベ要素
const RENO_PARTS = {
  entrance:{ name:"玄関まわり", items:[
    {k:"doma_shoe", t:"玄関横に土間収納（シューズクローク）を新設"},
    {k:"doma_space", t:"玄関横に土間スペースを新設"},
  ]},
  kitchen:{ name:"キッチン", items:[
    {k:"taimen", t:"対面式キッチンに変更"},
    {k:"open", t:"オープンキッチンに変更"},
    {k:"pantry", t:"キッチン横にパントリー（食品庫）を増設"},
  ]},

/* ▼ 暮らしタイプ別の間取りイメージ図（SVG）
   CSS変数で配色。改行は ‖ で区切ると2行になります。 */
function _room(x,y,w,h,label,fill){
  let t="";
  if(label){const ls=label.split("‖");
    const ly=y+h/2-(ls.length-1)*6;
    t=`<text x="${x+w/2}" y="${ly}" font-size="10.5" fill="var(--ink)" text-anchor="middle" dominant-baseline="middle">`+
      ls.map((s,i)=>`<tspan x="${x+w/2}" dy="${i?13:0}">${s}</tspan>`).join("")+`</text>`;}
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${fill||'var(--planroom)'}" stroke="var(--navy)" stroke-width="2"/>`+t;
}
function _tag(x,y,w,h,label){
  const ls=label.split("‖"); const ly=y+h/2-(ls.length-1)*6;
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="var(--planacc)" stroke="var(--gold)" stroke-width="2"/>`+
    `<text x="${x+w/2}" y="${ly}" font-size="9.5" fill="#8a6d2a" text-anchor="middle" dominant-baseline="middle" font-weight="bold">`+
    ls.map((s,i)=>`<tspan x="${x+w/2}" dy="${i?12:0}">${s}</tspan>`).join("")+`</text>`;
}

function renderQuiz(){
  const Q = data.HOUSEHOLDS[state.hh].questions;
  const duo = state.mode==="duo";
  // 価値観設問（pain以外）のインデックス
  const valIdx = Q.map((q,i)=>q.pain?null:i).filter(i=>i!==null);
  const totalVal = valIdx.length;
  const ansA = valIdx.filter(i=>state.answers.A[i]!==undefined).length;
  const ansB = valIdx.filter(i=>state.answers.B[i]!==undefined).length;
  const answered = duo ? Math.min(ansA,ansB) : ansA;

  let html=`<div class="progress no-print"><span style="width:${answered/totalVal*100}%"></span></div>
    <div class="pcount no-print">${answered} / ${totalVal} 問${duo?`（A:${ansA} ・ B:${ansB}）`:""}</div>`;

  if(duo){
    html+=`<div class="ab-head no-print">
      <span class="chip chipA">A：${state.names.A||"回答者A"}</span>
      <span class="chip chipB">B：${state.names.B||"回答者B"}</span></div>`;
  }

  Q.forEach((q,i)=>{
    if(q.pain){
      // ペイン設問：複数選択
      html+=`<div class="card"><div class="qnum">QUESTION ${i+1}</div>
        <div class="qtext">${q.q}</div>
        <p class="pain-note no-print">この回答は暮らしタイプの点数には影響しません。提案のヒントとして使います。</p>
        <div class="pains">`;
      q.opts.forEach((o,j)=>{
        const onA=state.pains.A.includes(j)?"onA":"";
        const onB=state.pains.B.includes(j)?"onB":"";
        html+=`<div class="painrow"><div class="label">${o.t}</div><div class="ppick">
          <div class="ptag ${duo?"":"solo"} ${onA}" onclick="togglePain('A',${j})">${duo?"A":"選ぶ"}</div>
          ${duo?`<div class="ptag onbcandidate ${onB}" onclick="togglePain('B',${j})">B</div>`:""}
        </div></div>`;
      });
      html+=`</div></div>`;
    }else{
      // 価値観設問：A/B それぞれ1択
      html+=`<div class="card"><div class="qnum">QUESTION ${i+1}</div>
        <div class="qtext">${q.q}</div><div class="opts">`;
      q.opts.forEach((o,j)=>{
        const onA=state.answers.A[i]===j?"onA":"";
        const onB=state.answers.B[i]===j?"onB":"";
        html+=`<div class="abopt"><div class="label">${o.t}</div><div class="abpick">
          <div class="abtag ${duo?"":"solo"} ${onA}" onclick="pickAB('A',${i},${j})">A${duo?"":"<small>選ぶ</small>"}</div>
          ${duo?`<div class="abtag ${onB}" onclick="pickAB('B',${i},${j})">B</div>`:""}
        </div></div>`;
      });
      html+=`</div></div>`;
    }
  });

  const ready = answered===totalVal;
  html+=`<div class="actions no-print">
    <button class="btn btn-sub" onclick="renderTaste()">テイストを選び直す</button>
    <button class="btn btn-main" ${ready?"":"disabled"} onclick="showResult()">
      ${ready?"診断結果を見る":`あと ${totalVal-answered} 問`}</button></div>`;
  app.innerHTML=html;
}

/* ---- スコア集計（A/B独立・ペインは非加点） ---- */
function calcScores(who){
  const Q=data.HOUSEHOLDS[state.hh].questions;
  const ans=state.answers[who]||{};
  const s={}; Object.keys(data.TYPES).forEach(k=>s[k]=0);
  Q.forEach((q,i)=>{
    if(q.pain) return; // ペインは加点しない
    const o=q.opts[ans[i]];
    if(o&&o.points)for(const k in o.points)s[k]+=o.points[k];
  });
  return s;
}

/* タイプ別スコアからトップタイプ・バー・文言を組み立てる */
function buildPersonResult(scores){
  const keys=Object.keys(data.TYPES);
  const max=Math.max(...keys.map(k=>scores[k]));
  const topKey=keys.find(k=>scores[k]===max);
  const maxScore=max||1;
  let bars="";
  [...keys].sort((a,b)=>scores[b]-scores[a]).forEach(k=>{
    const top=k===topKey?"top":"";
    bars+=`<div class="srow"><div class="slabel">${data.TYPES[k].label}</div>
      <div class="sbar ${top}"><span style="width:${scores[k]/maxScore*100}%"></span></div>
      <div class="sval">${scores[k]}</div></div>`;
  });
  return {topKey, T:data.TYPES[topKey], R:data.RESULTS[topKey], bars};
}

    ${ansRows}

  // 暮らしタイプ別の間取り（実画像。なければSVG図解にフォールバック）
  let planSvg="";
  const bld = state.building==="ko" ? "戸建て" : state.building==="man" ? "マンション" : "";
  if(state.building){
    const planSrc=data.IMG_DIR+topKey+"_"+state.building+data.IMG_EXT;
    const fallback = data.PLANS[topKey] ? data.PLANS[topKey]() : "";
    planSvg=`<div class="rcard"><h3>暮らし方の間取り事例
        ${bld?`<span class="tastebadge">${bld}</span>`:""}</h3>
      <div class="floorplan" data-plan="${planSrc}">${fallback}</div>
      <p style="font-size:13px;color:var(--ink-soft);margin-top:12px">※ ${T.label}におすすめの間取り事例（${bld}）です。実際の間取りは物件やご要望に合わせてご提案します。<br>画像をタップすると拡大できます。</p>
    </div>`;
  }

  // テイスト参考写真
  const TS = data.TASTES[state.taste];
  let gallery="";
  if(TS){
    const lSrc=data.IMG_DIR+TS.key+"_main"+data.IMG_EXT;
    const kSrc=data.IMG_DIR+TS.key+"_kitchen"+data.IMG_EXT;
    gallery=`<div class="rcard"><h3>参考イメージ
        <span class="tastebadge">${TS.name}</span></h3>
      <div class="gallery">
        <figure><div class="img" data-src="${lSrc}">イメージ写真</div><figcaption>リビング</figcaption></figure>
        <figure><div class="img" data-src="${kSrc}">イメージ写真</div><figcaption>キッチン</figcaption></figure>
      </div>
      <p style="font-size:13px;color:var(--ink-soft);margin-top:12px">※ ${TS.name}の参考イメージです。実際の施工事例は担当者がご案内します。<br>画像をタップすると拡大できます。</p>
    </div>`;
  }

  const r = state.restore || {};
  const esc = s => (s||"").replace(/"/g,"&quot;");
  app.innerHTML=`<div class="result">
    <div class="cust no-print">
      <input id="cname" placeholder="お客様のお名前（任意）" value="${esc(r.cname)}">
      <input id="cprop" placeholder="物件名・メモ（任意）" value="${esc(r.cprop)}"></div>
    ${duo?`<div class="cust no-print">
      <input id="nameA" placeholder="回答者Aのお名前（任意）" value="${esc(state.names.A)}">
      <input id="nameB" placeholder="回答者Bのお名前（任意）" value="${esc(state.names.B)}"></div>`:""}
    <div class="rhead">
      <div class="lead">${duo?"Aさまの":"あなたの"}暮らしタイプは</div>
      <div class="rtype"><span class="em">${T.label}</span></div>
      <div class="tag">${R.catch}</div>
      <div class="hhname">${H.ico} ${H.name}</div>
      ${TS?`<div class="hhname">${TS.name}</div>`:""}</div>
    ${twoResults}
    <div class="rcard"><h3>診断コメント${duo?"（Aさま）":""}</h3>
      <p>${R.desc}</p><p>${H.note}</p></div>
    <div class="rcard"><h3>おすすめのリノベ方針${duo?"（Aさま基準）":""}</h3><ul>${plan}</ul></div>
    ${painResult}
    ${planSvg}
    ${gallery}
    ${duo?"":`<div class="rcard"><h3>あなたの暮らしバランス</h3><div class="scores">${bars}</div></div>`}
    ${answerSheet}
    <div class="rcard memo no-print"><h3>営業メモ</h3>
      <label>ヒアリング内容・次回提案ポイントなど</label>
      <textarea id="memo" placeholder="例）予算◯◯万円、入居希望時期、気になっていた点 など">${r.memo||""}</textarea></div>
    <div class="rcard genai no-print"><h3>リノベイメージ生成（Gemini用プロンプト）</h3>
      <p style="font-size:13px;color:var(--ink-soft);margin-bottom:14px">
        どの部位の写真をリノベするか選び、行いたい工事をチェックすると、Geminiに貼り付けるプロンプトが作れます。
        作ったプロンプトをコピーして、Geminiに物件写真と一緒に貼り付けてください。複数の部位を追加できます。</p>
      <div id="genRows"></div>
      <div class="actions" style="margin-top:6px">
        <button class="btn btn-sub" style="flex:1" onclick="addGenRow()">＋ 部位を追加</button>
      </div>
      <div id="genOut"></div>
    </div>
    <div class="rfoot"><div>ViVi不動産株式会社　中古×リノベーション</div>
      <div class="date">診断日：${r.date||today}</div></div>
    <div class="actions no-print" style="margin-top:18px">
      <button class="btn btn-sub" onclick="location.reload()">最初から</button>
      <button class="btn btn-main" onclick="saveData()">データ保存</button>
      <button class="btn btn-main" onclick="window.print()">印刷・PDF</button></div>
  </div>`;
  // 画像が実在すれば背景に差し込み（無ければ「イメージ写真」のまま）。読み込めたらタップで拡大。
  document.querySelectorAll(".gallery .img").forEach(el=>{
    const url=el.getAttribute("data-src");
    const im=new Image();
    im.onload=()=>{
      el.style.backgroundImage=`url('${url}')`;el.textContent="";
      el.classList.add("zoomable");
      el.onclick=()=>openLightbox(url);
    };
    im.src=url;
  });
  // 間取り実画像があればSVG図解を置き換え、なければSVGのまま。読み込めたらタップで拡大。
  const fp=document.querySelector(".floorplan[data-plan]");
  if(fp){
    const url=fp.getAttribute("data-plan");
    const im=new Image();
    im.onload=()=>{
      fp.innerHTML=`<img src="${url}" alt="間取り事例" style="width:100%;height:auto;display:block;border-radius:6px">`;
      fp.classList.add("zoomable");
      fp.onclick=()=>openLightbox(url);
    };
    im.src=url;
  }
  state.restore=null;
  // お二人モード：名前入力をstateに反映（再描画で消えないように）
  const nA=document.getElementById("nameA"), nB=document.getElementById("nameB");
  if(nA) nA.addEventListener("input",e=>state.names.A=e.target.value);
  if(nB) nB.addEventListener("input",e=>state.names.B=e.target.value);
  genRows=[]; addGenRow();  // プロンプト生成の初期行
  window.scrollTo({top:0,behavior:"smooth"});
}

/* ---- Geminiプロンプト生成 ---- */
let genRows=[];
function addGenRow(){
  genRows.push({part:"", items:[]});
  renderGenRows();
}
function removeGenRow(i){
  genRows.splice(i,1);
  if(genRows.length===0) genRows.push({part:"",items:[]});
  renderGenRows();
}
function setGenPart(i,part){
  genRows[i].part=part; genRows[i].items=[];
  renderGenRows();
}
function toggleGenItem(i,k){
  const arr=genRows[i].items;
  const idx=arr.indexOf(k);
  if(idx>=0) arr.splice(idx,1); else arr.push(k);
  renderGenRows();
}
function renderGenRows(){
  const box=document.getElementById("genRows");
  if(!box) return;
  let html="";
  genRows.forEach((row,i)=>{
    html+=`<div class="genrow"><div class="genrow-head">
      <span class="genrow-no">写真 ${i+1}</span>
      ${genRows.length>1?`<button class="genx" onclick="removeGenRow(${i})">×</button>`:""}</div>
      <select onchange="setGenPart(${i},this.value)">
        <option value="">部位を選んでください</option>`;
    for(const pk in data.RENO_PARTS){
      html+=`<option value="${pk}" ${row.part===pk?"selected":""}>${data.RENO_PARTS[pk].name}</option>`;
    }
    html+=`</select>`;
    if(row.part && data.RENO_PARTS[row.part].items.length){
      html+=`<div class="genitems">`;
      data.RENO_PARTS[row.part].items.forEach(it=>{
        const on=row.items.includes(it.k);
        html+=`<label class="genitem ${on?'on':''}">
          <input type="checkbox" ${on?"checked":""} onchange="toggleGenItem(${i},'${it.k}')">
          <span>${it.t}</span></label>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  box.innerHTML=html;
  renderGenOut();
}
function buildPrompt(row){
  const TS=data.TASTES[state.taste];
  const tasteText = TS ? data.TASTE_PROMPT[state.taste] : "";
  let work="";
  if(row.part && row.part!=="other" && row.items.length){
    const labels=row.items.map(k=>{
      const it=data.RENO_PARTS[row.part].items.find(x=>x.k===k);
      return it?it.t:"";
    }).filter(Boolean);
    work="次のリノベーションを施した状態にしてください：" + labels.join("、") + "。";
  }
  return [data.PROMPT_FIXED, work, tasteText].filter(Boolean).join(" ");
}
function renderGenOut(){
  const out=document.getElementById("genOut");
  if(!out) return;
  let html="";
  genRows.forEach((row,i)=>{
    if(!row.part) return;
    if(row.part!=="other" && row.items.length===0) return;
    const txt=buildPrompt(row);
    const pn=data.RENO_PARTS[row.part].name;
    html+=`<div class="genprompt">
      <div class="genprompt-h">写真 ${i+1}：${pn} 用プロンプト</div>
      <textarea readonly id="gp${i}">${txt}</textarea>
      <button class="btn btn-main" style="width:100%;margin-top:8px" onclick="copyPrompt(${i})">このプロンプトをコピー</button>
    </div>`;
  });
  if(html==="") html=`<p style="font-size:13px;color:var(--ink-soft);margin-top:12px">部位を選び、工事内容にチェックを入れるとプロンプトが表示されます。</p>`;
  out.innerHTML=html;
}
function copyPrompt(i){
  const ta=document.getElementById("gp"+i);
  if(!ta) return;
  ta.select();
  navigator.clipboard.writeText(ta.value).then(()=>{
    alert("プロンプトをコピーしました。\nGeminiを開いて、物件写真と一緒に貼り付けてください。");
  }).catch(()=>{
    document.execCommand("copy");
    alert("プロンプトをコピーしました。");
  });
}

/* ---- データ保存（JSON書き出し） ---- */
async function saveData(){
  const cname=(document.getElementById("cname")||{}).value||"";
  const cprop=(document.getElementById("cprop")||{}).value||"";
  const memo=(document.getElementById("memo")||{}).value||"";
  const nA=(document.getElementById("nameA")||{}).value; if(nA!==undefined) state.names.A=nA;
  const nB=(document.getElementById("nameB")||{}).value; if(nB!==undefined) state.names.B=nB;
  const payload={
    app:"vivi-reno-shindan", version:2,
    savedAt:new Date().toISOString(),
    date:new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric"}),
    hh:state.hh, building:state.building, taste:state.taste, mode:state.mode,
    answers:state.answers, pains:state.pains, names:state.names,
    cname, cprop, memo
  };
  const json=JSON.stringify(payload,null,2);
  const stamp=new Date().toISOString().slice(0,10);
  const safe=(cname||"診断").replace(/[\\/:*?"<>|]/g,"_");
  const fname=`リノベ診断_${safe}_${stamp}.json`;

  // 対応ブラウザ（Chrome系）：保存先を選べる
  if(window.showSaveFilePicker){
    try{
      const handle=await window.showSaveFilePicker({
        suggestedName:fname,
        types:[{description:"診断データ",accept:{"application/json":[".json"]}}]
      });
      const w=await handle.createWritable();
      await w.write(json); await w.close();
      alert("診断データを保存しました。\nファイル名："+fname);
      return;
    }catch(err){
      if(err && err.name==="AbortError") return; // ユーザーがキャンセル
      // それ以外は従来方式にフォールバック
    }
  }
  // 非対応ブラウザ：従来どおりダウンロードフォルダへ
  const blob=new Blob([json],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=fname;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  alert("診断データを保存しました。\n\nファイル名："+fname+"\n（パソコンのダウンロードフォルダに入ります）\n\n別のスタッフと共有するときは、このファイルを渡してください。\n最初の画面の「保存データを読み込む」から開けます。");
}

/* ---- データ読み込み（JSON復元・旧形式も後方互換） ---- */
function loadData(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.app!=="vivi-reno-shindan"||!data.HOUSEHOLDS[d.hh])
        throw new Error("このツールの保存データではないようです。");
      state.hh=d.hh;
      state.building=d.building||null;
      state.taste=d.taste||null;

      // 旧形式（version 1：answersが {0:1,...} の単一）を新形式へ変換
      const isOld = !d.answers || (d.answers && d.answers.A===undefined);
      if(isOld){
        state.mode="solo";
        state.answers={A:d.answers||{}, B:{}};
        state.pains={A:[], B:[]};
        state.names={A:"", B:""};
      }else{
        state.mode=d.mode||"solo";
        state.answers={A:d.answers.A||{}, B:d.answers.B||{}};
        state.pains={A:(d.pains&&d.pains.A)||[], B:(d.pains&&d.pains.B)||[]};
        state.names={A:(d.names&&d.names.A)||"", B:(d.names&&d.names.B)||""};
      }
      state.restore={cname:d.cname,cprop:d.cprop,memo:d.memo,date:d.date};
      sub.innerHTML=data.HOUSEHOLDS[d.hh].name+"の診断データを読み込みました。";

      // 価値観設問が全問回答済みなら結果へ、未完なら設問画面へ
      const Q=data.HOUSEHOLDS[d.hh].questions;
      const valIdx=Q.map((q,i)=>q.pain?null:i).filter(i=>i!==null);
      const okA=valIdx.every(i=>state.answers.A[i]!==undefined);
      const okB=state.mode==="duo" ? valIdx.every(i=>state.answers.B[i]!==undefined) : true;
      if(okA&&okB) showResult();
      else renderQuiz();
    }catch(err){
      alert("読み込めませんでした。\n"+(err.message||"ファイル形式を確認してください。"));
    }
    e.target.value=""; // 同じファイルを再選択できるよう
  };
  reader.readAsText(file,"utf-8");
}

renderSelect();
